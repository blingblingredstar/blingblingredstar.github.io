        <h2 id="关于console控制台的一些用法"><a href="#关于console控制台的一些用法" class="headerlink" title="关于console控制台的一些用法"></a>关于console控制台的一些用法</h2><p>来自Wes Bos的<a target="_blank" rel="noopener" href="https://courses.wesbos.com/account/access/5be7ff21c413951cd2b18ede/view/194129876">JavaScript30</a>这个视频。</p>
<span id="more"></span>

<figure class="highlight javascript"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br></pre></td><td class="code"><pre><span class="line">&lt;body&gt;</span><br><span class="line"></span><br><span class="line">  &lt;p onClick=<span class="string">&quot;makeGreen()&quot;</span>&gt;×BREAK×DOWN×&lt;/p&gt;</span><br><span class="line"></span><br><span class="line">  &lt;script&gt;</span><br><span class="line">    <span class="keyword">const</span> dogs = [&#123; <span class="attr">name</span>: <span class="string">&#x27;Snickers&#x27;</span>, <span class="attr">age</span>: <span class="number">2</span> &#125;, &#123; <span class="attr">name</span>: <span class="string">&#x27;hugo&#x27;</span>, <span class="attr">age</span>: <span class="number">8</span> &#125;];</span><br><span class="line"></span><br><span class="line">    <span class="function"><span class="keyword">function</span> <span class="title">makeGreen</span>(<span class="params"></span>) </span>&#123;</span><br><span class="line">      <span class="keyword">const</span> p = <span class="built_in">document</span>.querySelector(<span class="string">&#x27;p&#x27;</span>);</span><br><span class="line">      p.style.color = <span class="string">&#x27;#BADA55&#x27;</span>;</span><br><span class="line">      p.style.fontSize = <span class="string">&#x27;50px&#x27;</span>;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="comment">// 当我们想知道哪段代码改变了页面上的DOM元素时，可以在页面上右键检查元素，然后在控制台右击控制台elements中的HTML代码部分</span></span><br><span class="line">    <span class="comment">// 在右击后选择Break on中的Attibute modification，然后刷新浏览器，进行改变该DOM元素的操作，就可以调到对应的js代码块了</span></span><br><span class="line">    <span class="comment">// 暂时可以联想为比较快捷的添加了断点，方便调试。</span></span><br><span class="line"></span><br><span class="line">    <span class="comment">// Regular</span></span><br><span class="line">    <span class="built_in">console</span>.log(<span class="string">&#x27;hello&#x27;</span>)</span><br><span class="line"></span><br><span class="line">    <span class="comment">// Interpolated</span></span><br><span class="line">    <span class="comment">// 可以插入字符串</span></span><br><span class="line">    <span class="built_in">console</span>.log(<span class="string">&#x27;Hello I am a %s string!&#x27;</span>,<span class="string">&#x27;✋&#x27;</span>)</span><br><span class="line">    <span class="comment">// 也可是使用es6中的模板字符串</span></span><br><span class="line">    <span class="built_in">console</span>.log(<span class="string">`Hello I am a 👌`</span>)</span><br><span class="line">    <span class="comment">// Styled</span></span><br><span class="line">    <span class="comment">// 可以插入样式</span></span><br><span class="line">    <span class="built_in">console</span>.log(<span class="string">&#x27;%c I am a text&#x27;</span>,<span class="string">&#x27;font-size:30px&#x27;</span>)</span><br><span class="line">    <span class="comment">// warning!</span></span><br><span class="line">    <span class="built_in">console</span>.log(<span class="string">&#x27;I am a warning&#x27;</span>)</span><br><span class="line">    <span class="comment">// Error :|</span></span><br><span class="line">    <span class="built_in">console</span>.log(<span class="string">&#x27;I am a Error&#x27;</span>)</span><br><span class="line">    <span class="comment">// Info</span></span><br><span class="line">    <span class="built_in">console</span>.info(<span class="string">&#x27;I am some info&#x27;</span>)</span><br><span class="line">    <span class="comment">// Testing</span></span><br><span class="line">    <span class="comment">// console.assert类似if语句，传入两个参数，前一个是判断条件，下一个是执行语句</span></span><br><span class="line">    <span class="comment">// 通过console.assert，如下可以方便判断是否有一个元素或者一些其他用法。</span></span><br><span class="line">    <span class="keyword">const</span> p = <span class="built_in">document</span>.querySelector(<span class="string">&#x27;p&#x27;</span>)</span><br><span class="line">    <span class="built_in">console</span>.assert(p.classList.contains(<span class="string">&#x27;active&#x27;</span>),<span class="string">&#x27;That is wrong!&#x27;</span>)</span><br><span class="line">    <span class="comment">// clearing</span></span><br><span class="line">    <span class="comment">// 清空控制台</span></span><br><span class="line">    <span class="built_in">console</span>.clear()</span><br><span class="line">    <span class="comment">// 或者可以在控制台直接输如clear()，因为直接输入时作用域为当前对象，可以直接调用</span></span><br><span class="line"></span><br><span class="line">    <span class="comment">// Viewing DOM Elements</span></span><br><span class="line">    <span class="comment">// 当我们直接console.log(aDomElement)时，会输出一个HTML标签，无法查看他的属性和方法</span></span><br><span class="line">    <span class="comment">// 使用console.dir(aDomElement)，就可以像查询对象一样出现他的属性和方法了。</span></span><br><span class="line">    <span class="built_in">console</span>.log(p)</span><br><span class="line">    <span class="built_in">console</span>.dir(p)</span><br><span class="line">    <span class="comment">// Grouping together</span></span><br><span class="line">    <span class="comment">// 可以把多个console.log包裹起来，是控制台更加易读。</span></span><br><span class="line">    dogs.forEach(<span class="function"><span class="params">dog</span> =&gt;</span> &#123;</span><br><span class="line">      <span class="built_in">console</span>.groupCollapsed(<span class="string">`<span class="subst">$&#123;dog.name&#125;</span>`</span>)</span><br><span class="line">      <span class="built_in">console</span>.log(<span class="string">`This is <span class="subst">$&#123;dog.name&#125;</span>`</span>)</span><br><span class="line">      <span class="built_in">console</span>.log(<span class="string">`<span class="subst">$&#123;dog.name&#125;</span> is <span class="subst">$&#123;dog.age&#125;</span> years old`</span>)</span><br><span class="line">      <span class="built_in">console</span>.log(<span class="string">`<span class="subst">$&#123;dog.name&#125;</span> is <span class="subst">$&#123;dog.age * <span class="number">7</span>&#125;</span> dog years old`</span>)</span><br><span class="line">      <span class="built_in">console</span>.groupEnd(<span class="string">`<span class="subst">$&#123;dog.name&#125;</span>`</span>)</span><br><span class="line">    &#125;);</span><br><span class="line"></span><br><span class="line">    <span class="comment">// counting</span></span><br><span class="line">    <span class="comment">// 顾名思义，计数器</span></span><br><span class="line">    <span class="built_in">console</span>.count(<span class="string">&#x27;num1&#x27;</span>)</span><br><span class="line">    <span class="built_in">console</span>.count(<span class="string">&#x27;num1&#x27;</span>)</span><br><span class="line">    <span class="built_in">console</span>.count(<span class="string">&#x27;num1&#x27;</span>)</span><br><span class="line">    <span class="built_in">console</span>.count(<span class="string">&#x27;num2&#x27;</span>)</span><br><span class="line">    <span class="built_in">console</span>.count(<span class="string">&#x27;num2&#x27;</span>)</span><br><span class="line">    <span class="comment">// timing</span></span><br><span class="line">    <span class="comment">// 顾名思义，计时器</span></span><br><span class="line">    <span class="built_in">console</span>.time(<span class="string">&#x27;fetching data&#x27;</span>);</span><br><span class="line">    fetch(<span class="string">&#x27;https://api.github.com/users/wesbos&#x27;</span>)</span><br><span class="line">      .then(<span class="function"><span class="params">data</span> =&gt;</span> data.json())</span><br><span class="line">      .then(<span class="function"><span class="params">data</span> =&gt;</span> &#123;</span><br><span class="line">        <span class="built_in">console</span>.timeEnd(<span class="string">&#x27;fetching data&#x27;</span>);</span><br><span class="line">        <span class="built_in">console</span>.log(data);</span><br><span class="line">      &#125;);</span><br><span class="line"></span><br><span class="line">  &lt;/script&gt;</span><br><span class="line">&lt;/body&gt;</span><br></pre></td></tr></table></figure>
